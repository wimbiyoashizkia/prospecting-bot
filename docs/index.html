<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prospecting Calculator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="container">
  <header>
    <h1>Prospecting Calculator</h1>
  </header>

  <section class="panel">
    <h2>Setup</h2>

    <div class="control">
      <label>Search mineral</label>
      <input type="text" id="mineralSearch" placeholder="Type mineral name..." />
      <div id="suggestions" class="suggestions"></div>
    </div>

    <div class="grid-3">
      <div class="control">
        <label>Luck</label>
        <input type="number" id="luckInput" value="100" min="0" />
      </div>
      <div class="control">
        <label>Capacity</label>
        <input type="number" id="capacityInput" value="50" min="1" />
      </div>
      <div class="control">
        <label>Location</label>
        <select id="locationSelect"></select>
      </div>
    </div>

    <div class="grid-2">
      <div class="control">
        <label>Dig Strength</label>
        <input type="number" id="digStrengthInput" value="3" min="0" step="1" />
      </div>
      <div class="control">
        <label>Dig Speed (%)</label>
        <input type="number" id="digSpeedInput" value="100" min="0.01" step="0.01" />
      </div>
      <div class="control">
        <label>Shake Strength</label>
        <input type="number" id="shakeStrengthInput" value="1" min="0" step="0.01" />
      </div>
      <div class="control">
        <label>Shake Speed (%)</label>
        <input type="number" id="shakeSpeedInput" value="500" min="0" />
      </div>
    </div>

    <div class="badge-row">
      <div class="badge">
        <span class="dot" id="rarityDot"></span>
        <span id="mineralLabel">Select a mineral</span>
        <span id="rarityTag"></span>
      </div>
      <span class="best-location">
        Best location: <b id="bestLocation">—</b>
      </span>
    </div>
  </section>

  <section class="panel">
    <h2>Results</h2>

    <div class="metrics">
      <div class="metric">
        <div class="k">Chance per attempt</div>
        <div class="v" id="chanceCell">—</div>
        <div class="s" id="oneInAttempt">—</div>
      </div>
      <div class="metric">
        <div class="k">Expected finds</div>
        <div class="v" id="expectedCell">—</div>
        <div class="s" id="expectedSub">per attempt</div>
      </div>
    </div>

    <div class="metrics" style="margin-top:12px;">
      <div class="metric">
        <div class="k">Attempts for 50%</div>
        <div class="v" id="attempts50Cell">—</div>
        <div class="s" id="time50Cell">—</div>
      </div>
      <div class="metric">
        <div class="k">Attempts for 90%</div>
        <div class="v" id="attempts90Cell">—</div>
        <div class="s" id="time90Cell">—</div>
      </div>
      <div class="metric">
        <div class="k">Attempts for 99%</div>
        <div class="v" id="attempts99Cell">—</div>
        <div class="s" id="time99Cell">—</div>
      </div>
    </div>
  </section>

  <section class="panel">
    <h2>All Locations</h2>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Location</th>
            <th>Base %</th>
            <th>Chance per attempt</th>
            <th>~1 in</th>
          </tr>
        </thead>
        <tbody id="locationTable"></tbody>
      </table>
    </div>
    <div class="note">Results are estimates — RNG varies in-game.</div>
  </section>
</div>

<script src="script.js"></script>
</body>
</html>
